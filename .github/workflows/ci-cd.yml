# ──────────────────────────────────────────────────────────────────────────────
# Prompt 29 — GitHub Actions CI/CD
# ──────────────────────────────────────────────────────────────────────────────
#
# Triggers:
#   push to any branch  → ESLint + Jest (CI)
#   push / merge to main → Vercel production deploy (CD)
#
# Required GitHub Secrets  (Settings → Secrets → Actions):
#   VERCEL_TOKEN        ← from vercel.com/account/tokens
#   VERCEL_ORG_ID       ← from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID   ← from .vercel/project.json after `vercel link`
#   ENCRYPTION_KEY      ← 64-char hex key for AES-256 (used in test env)
#   NEXTAUTH_SECRET     ← random string for NextAuth
# ──────────────────────────────────────────────────────────────────────────────

name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: test
      # Minimal env vars needed for import-time validation in lib/env.ts
      HUGGINGFACE_API_KEY: placeholder
      OPENAI_API_KEY: placeholder
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shruti_test
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: placeholder
      GOOGLE_CLIENT_SECRET: placeholder
      VOCAL_TONE_API_URL: http://localhost:8000
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── ESLint ──
      - name: Run ESLint
        run: npm run lint

      # ── Jest (skipped gracefully if no test files exist yet) ──
      - name: Run Jest tests
        run: |
          if npx jest --listTests 2>/dev/null | grep -q '.'; then
            npx jest --ci --coverage --passWithNoTests
          else
            echo "No test files found — skipping Jest."
          fi

      # ── Build verification (catches TypeScript & compilation errors) ──
      - name: Build
        run: npm run build

  # ── 2. Deploy to Vercel (main branch only) ─────────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Print deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
